services:
  db:
    image: postgres:16-alpine
    container_name: lotbidgo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lotbidgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    container_name: lotbidgo-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@db:5432/lotbidgo
      JWT_SECRET: dev-secret-key
    depends_on:
      - db

  client:
    build: ./client
    container_name: lotbidgo-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata: